# Logstash Pipeline: fab-forwarder.conf
#
# Reads fab logs from Elasticsearch every minute and forwards
# them to SmartLogParser for parsing and structured storage.
#
# Flow: Elasticsearch → Logstash → SmartLogParser /api/ingest/logstash

input {
  # --- PRIMARY: Read new logs from Elasticsearch ---
  elasticsearch {
    hosts              => ["${ELASTIC_URL}"]
    index              => "fab-logs-2026"
    query              => '{
      "query": {
        "range": {
          "@timestamp": { "gte": "now-1m" }
        }
      },
      "sort": [{ "@timestamp": "asc" }]
    }'
    schedule           => "* * * * *"
    docinfo            => true
    docinfo_fields     => ["_index", "_id"]
  }

  # --- ALTERNATIVE: Read from log files directly ---
  # Uncomment to ingest from a local directory of log files.
  # file {
  #   path             => "/var/log/fab/**/*.log"
  #   start_position   => "beginning"
  #   sincedb_path     => "/dev/null"
  #   codec            => "plain"
  # }

  # --- ALTERNATIVE: Receive from Splunk Universal Forwarder via TCP ---
  # Splunk forwarder must be configured to send to this host:5514.
  # tcp {
  #   port             => 5514
  #   codec            => json
  # }
}

filter {
  # Normalize field names so the parser always sees 'message'
  if [log] and ![message] {
    mutate { rename => { "log" => "message" } }
  }

  # Tag the event with its origin
  mutate {
    add_field => {
      "forwarded_by" => "logstash"
      "source_index" => "%{[@metadata][_index]}"
    }
  }

  # Drop internal Logstash metadata fields before forwarding
  mutate {
    remove_field => ["@version", "host", "port", "tags"]
  }
}

output {
  # --- Forward to SmartLogParser ---
  http {
    url          => "${PARSER_URL}/api/ingest/logstash"
    http_method  => "post"
    format       => "json"
    content_type => "application/json"
    headers      => { "X-Source" => "logstash-fab-pipeline" }
    pool_max     => 5
    retry_failed => true
    retry_count  => 3
  }

  # --- Debug: print to console (disable in production) ---
  stdout {
    codec => rubydebug
  }
}
